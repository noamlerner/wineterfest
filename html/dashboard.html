<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wineterfest — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0608;
      --surface: #1c1215;
      --surface-raised: #251820;
      --border: #332028;
      --accent: #9B2335;
      --gold: #C9A050;
      --gold-hover: #d4ae63;
      --text: #f0e8e0;
      --muted: #8a7a75;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      padding: 0 0 40px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      padding: 48px 24px 28px;
    }
    .greeting-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .greeting-name {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
    }

    /* Action grid */
    .actions {
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .action-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-card:active { transform: scale(0.97); background: var(--surface-raised); }
    @media (hover: hover) { .action-card:hover { background: var(--surface-raised); } }
    .action-icon { font-size: 1.6rem; line-height: 1; }
    .action-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .action-card.highlight {
      background: var(--accent);
      border-color: var(--accent);
    }
    .action-card.highlight:active { background: #b52a3e; }
    @media (hover: hover) { .action-card.highlight:hover { background: #b52a3e; } }

    .stats-btn {
      margin: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .stats-btn:active { background: var(--surface-raised); }
    @media (hover: hover) { .stats-btn:hover { background: var(--surface-raised); } }
    .stats-btn-left { display: flex; align-items: center; gap: 12px; }
    .stats-btn-icon { font-size: 1.4rem; }
    .stats-btn-label { font-weight: 600; font-size: 0.95rem; }
    .stats-btn-arrow { color: var(--gold); font-size: 1.1rem; }

    /* Divider */
    .divider {
      margin: 28px 24px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-tabs { display: flex; gap: 4px; }
    .tab-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      background: var(--surface-raised);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* List */
    .list-section { padding: 16px 24px 0; }
    .list-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .wine-list { display: flex; flex-direction: column; gap: 8px; }
    .wine-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .wine-num {
      background: var(--surface-raised);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--gold);
      flex-shrink: 0;
    }
    .wine-info { flex: 1; min-width: 0; }
    .wine-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .wine-meta { font-size: 0.8rem; color: var(--muted); }
    .wine-badge {
      background: var(--surface-raised);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="greeting-label">Welcome back</div>
    <div class="greeting-name" id="greeting">—</div>
  </div>

  <div class="actions">
    <a href="/register-wine" class="action-card highlight">
      <div class="action-icon">🍷</div>
      <div class="action-label">Register Wine</div>
    </a>
    <a href="/rate-wine" class="action-card">
      <div class="action-icon">⭐</div>
      <div class="action-label">Rate Wine</div>
    </a>
  </div>

  <a href="/stats-display" class="stats-btn">
    <div class="stats-btn-left">
      <div class="stats-btn-icon">📊</div>
      <div class="stats-btn-label">View Stats</div>
    </div>
    <div class="stats-btn-arrow">→</div>
  </a>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-tabs">
      <button class="tab-btn active" id="tab-ratings" onclick="showRatings()">My Ratings</button>
      <button class="tab-btn" id="tab-wines" onclick="showWines()">My Wines</button>
    </div>
    <div class="divider-line"></div>
  </div>

  <div class="list-section">
    <div class="list-title" id="list-title">Your Ratings</div>
    <div class="wine-list" id="wine-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <script>
    const getCookie = name => {
      const c = document.cookie.split('; ').find(r => r.startsWith(name + '='));
      return c ? decodeURIComponent(c.split('=')[1]) : null;
    };
    const username = getCookie('wineuserc');
    if (username) document.getElementById('greeting').textContent = username;

    let ratingsData = [];
    let winesData = null;

    async function fetchRatings() {
      try {
        const res = await fetch(`/my-ratings?username=${encodeURIComponent(username)}`);
        if (!res.ok) throw new Error();
        ratingsData = await res.json();
        renderRatings();
      } catch {
        document.getElementById('wine-list').innerHTML = '<div class="empty-state">Failed to load ratings.</div>';
      }
    }

    async function fetchWines() {
      try {
        const res = await fetch(`/my-wines?username=${encodeURIComponent(username)}`);
        if (!res.ok) throw new Error();
        winesData = await res.json();
        renderWines();
      } catch {
        document.getElementById('wine-list').innerHTML = '<div class="empty-state">Failed to load wines.</div>';
      }
    }

    function renderRatings() {
      document.getElementById('list-title').textContent = 'Your Ratings';
      const list = document.getElementById('wine-list');
      if (!ratingsData.length) {
        list.innerHTML = '<div class="empty-state">No ratings yet.</div>';
        return;
      }
      list.innerHTML = ratingsData.map(item => `
        <div class="wine-item">
          <div class="wine-num">${item.anonymizedNumber}</div>
          <div class="wine-info">
            <div class="wine-name">Wine #${item.anonymizedNumber}</div>
            <div class="wine-meta">Guessed $${item.priceGuess}</div>
          </div>
          <div class="wine-badge">${item.rating}/10</div>
        </div>
      `).join('');
    }

    function renderWines() {
      document.getElementById('list-title').textContent = 'Your Wines';
      const list = document.getElementById('wine-list');
      if (!winesData || !winesData.length) {
        list.innerHTML = '<div class="empty-state">No wines registered.</div>';
        return;
      }
      list.innerHTML = winesData.map(item => `
        <div class="wine-item">
          <div class="wine-num">${item.anonymizedNumber}</div>
          <div class="wine-info">
            <div class="wine-name">${item.wineName}</div>
            <div class="wine-meta">$${item.winePrice}</div>
          </div>
        </div>
      `).join('');
    }

    function showRatings() {
      document.getElementById('tab-ratings').classList.add('active');
      document.getElementById('tab-wines').classList.remove('active');
      renderRatings();
    }

    function showWines() {
      document.getElementById('tab-wines').classList.add('active');
      document.getElementById('tab-ratings').classList.remove('active');
      if (winesData === null) fetchWines();
      else renderWines();
    }

    fetchRatings();
  </script>
</body>
</html>
