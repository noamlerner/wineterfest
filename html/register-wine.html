<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wineterfest — Register Wine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0608;
      --surface: #1c1215;
      --surface-raised: #251820;
      --border: #332028;
      --gold: #C9A050;
      --gold-hover: #d4ae63;
      --text: #f0e8e0;
      --muted: #8a7a75;
      --error: #e05560;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      padding: 0 0 40px;
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      padding: 48px 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .form-wrap { padding: 0 24px; display: flex; flex-direction: column; gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 15px 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
    }
    input:focus { border-color: var(--gold); }
    input::placeholder { color: var(--muted); }
    input::-webkit-inner-spin-button,
    input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: -4px;
    }
    .error {
      color: var(--error);
      font-size: 0.875rem;
      display: none;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-top: 8px;
    }
    .btn-gold { background: var(--gold); color: #0d0608; }
    .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; }
    @media (hover: hover) { .btn-gold:not(:disabled):hover { background: var(--gold-hover); } }
    .btn-gold:not(:disabled):active { transform: scale(0.98); }

    .success-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }
    .success-icon { font-size: 3rem; }
    .success-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/dashboard" class="back-btn">←</a>
    <h1>Register Wine</h1>
  </div>

  <form id="register-wine-form" class="form-wrap">
    <div class="field">
      <label for="wine-name">Wine name</label>
      <input type="text" id="wine-name" placeholder="e.g. Château Margaux 2018" required autocapitalize="words">
    </div>

    <div class="field">
      <label for="wine-price">Price for 750ml</label>
      <input type="number" id="wine-price" placeholder="$0.00" step="0.01" min="0" required inputmode="decimal">
      <div class="hint">This stays secret until the reveal.</div>
    </div>

    <div class="field">
      <label for="anonymized-number">Tag number</label>
      <input type="number" id="anonymized-number" placeholder="Number on the label" required inputmode="numeric">
    </div>

    <div class="field">
      <label for="brought-with">Brought with <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input type="text" id="brought-with" placeholder="Co-conspirator's name" autocapitalize="words">
    </div>

    <div class="error" id="error-msg"></div>

    <button type="submit" class="btn btn-gold" id="submit-btn">Register Wine</button>
  </form>

  <div class="success-overlay" id="success">
    <div class="success-icon">🍾</div>
    <div class="success-text">Wine registered!</div>
  </div>

  <script>
    const getCookie = name => {
      const c = document.cookie.split('; ').find(r => r.startsWith(name + '='));
      return c ? decodeURIComponent(c.split('=')[1]) : null;
    };

    document.getElementById('register-wine-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorEl = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');
      errorEl.style.display = 'none';

      const wineName = document.getElementById('wine-name').value.trim();
      const winePrice = parseFloat(document.getElementById('wine-price').value);
      const anonymizedNumber = parseInt(document.getElementById('anonymized-number').value, 10);
      const broughtWith = document.getElementById('brought-with').value.trim();
      const username = getCookie('wineuserc');

      if (!username) { window.location.href = '/signin'; return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Registering...';

      try {
        const response = await fetch('/register-wine', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wineName, winePrice, anonymizedNumber, username, broughtWith }),
        });
        if (response.ok) {
          document.getElementById('success').classList.add('show');
          setTimeout(() => window.location.href = '/dashboard', 1200);
        } else {
          const msg = await response.text();
          errorEl.textContent = msg || 'Something went wrong.';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Register Wine';
        }
      } catch {
        errorEl.textContent = 'Network error. Try again.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Register Wine';
      }
    });
  </script>
</body>
</html>
