<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wineterfest — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0608;
      --surface: #1c1215;
      --surface-raised: #251820;
      --border: #332028;
      --gold: #C9A050;
      --gold-hover: #d4ae63;
      --text: #f0e8e0;
      --muted: #8a7a75;
      --error: #e05560;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: var(--gold);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .tagline {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 40px;
      font-style: italic;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
      -webkit-appearance: none;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: var(--muted); }
    .error {
      color: var(--error);
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-gold { background: var(--gold); color: #0d0608; }
    @media (hover: hover) { .btn-gold:hover { background: var(--gold-hover); } }
    .btn-gold:active { transform: scale(0.98); }
    .footer-link {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.875rem;
    }
    .footer-link a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wordmark">Wineterfest</div>
  <p class="tagline">Rate blindly. Judge freely.</p>

  <div class="card">
    <h2>Join the party</h2>
    <form id="signup-form">
      <label for="username">Your name</label>
      <input type="text" id="username" placeholder="e.g. Noam" autocomplete="off" autocapitalize="words" required>
      <div class="error" id="error-msg"></div>
      <button type="submit" class="btn btn-gold">Sign Up</button>
    </form>
  </div>

  <div class="footer-link">Already here? <a href="/signin">Sign in</a></div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';
      try {
        const response = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });
        if (response.ok) {
          const exp = new Date(Date.now() + 24 * 60 * 60 * 1000).toUTCString();
          document.cookie = `wineuserc=${encodeURIComponent(username)}; path=/; expires=${exp};`;
          window.location.href = '/dashboard';
        } else {
          const error = await response.json();
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Something went wrong. Try again.';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
