<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wineterfest — Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0608;
      --surface: #1c1215;
      --surface-raised: #251820;
      --border: #332028;
      --accent: #9B2335;
      --gold: #C9A050;
      --text: #f0e8e0;
      --muted: #8a7a75;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--gold);
    }
    .progress {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }
    .progress span { color: var(--text); font-weight: 600; }

    /* Main layout */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
    }
    .sidebar-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0 20px 12px;
    }
    .sidebar-item {
      padding: 10px 20px;
      font-size: 0.875rem;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .sidebar-item:hover { color: var(--text); background: var(--surface); }
    .sidebar-item.active {
      color: var(--gold);
      border-left-color: var(--gold);
      background: var(--surface);
      font-weight: 500;
    }

    /* Main panel */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* Stat card */
    .stat-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 56px 32px;
      overflow: hidden;
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .stat-eyebrow {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .stat-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .stat-desc {
      font-size: 1rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 32px;
    }

    /* Table area */
    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .table-wrap.hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      overflow: visible;
    }
    thead, thead tr {
      overflow: visible;
    }
    thead tr {
      border-bottom: 1px solid var(--border);
    }
    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .tip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 700;
      margin-left: 5px;
      cursor: help;
      position: relative;
      vertical-align: middle;
      text-transform: none;
      letter-spacing: 0;
    }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 400;
      line-height: 1.5;
      padding: 8px 12px;
      width: 220px;
      text-align: left;
      white-space: normal;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .tip:hover::after { opacity: 1; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      opacity: 0;
      animation: rowIn 0.3s ease forwards;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(odd) { background: var(--surface); }
    @keyframes rowIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
    td {
      padding: 12px 16px;
      color: var(--text);
    }
    td:first-child { color: var(--gold); font-weight: 600; }

    /* Reveal button */
    .reveal-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.15s;
      align-self: flex-start;
    }
    .reveal-btn:hover { background: var(--surface-raised); border-color: var(--gold); color: var(--gold); }
    .reveal-btn.hidden { display: none; }

    /* Bottom bar */
    .bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 56px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot-track { display: flex; gap: 6px; align-items: center; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }
    .dot.active { background: var(--gold); width: 18px; border-radius: 3px; }
    .nav-btns { display: flex; gap: 10px; }
    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 10px 22px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--surface-raised); }
    .nav-btn.primary {
      background: var(--gold);
      border-color: var(--gold);
      color: #0d0608;
    }
    .nav-btn.primary:hover { background: #d4ae63; }

    /* Loading */
    #loader {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wordmark">Wineterfest</div>
    <div class="progress" id="progress" style="display:none">
      <span id="progress-cur">1</span> / <span id="progress-total">9</span>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar" style="display:none">
      <div class="sidebar-label">Stats</div>
      <div id="sidebar-list"></div>
    </nav>

    <div class="main" id="main">
      <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Crunching the numbers...</div>
      </div>
    </div>
  </div>

  <div class="bottombar" id="bottombar" style="display:none">
    <div class="dot-track" id="dot-track"></div>
    <div class="nav-btns">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Prev</button>
      <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <script>
    let stats = [];
    let currentIndex = 0;
    let revealed = {};

    const TOOLTIPS = {
      'Value Score': 'eᵃᵛᵍ⁻ʳᵃᵗⁱⁿᵍ ÷ actual price. Rewards wines that score high and cost less.',
      'Controversy Score': 'Population standard deviation of all ratings × 100. Higher means raters disagreed more.',
    };

    async function fetchStats() {
      try {
        const res = await fetch('/stats');
        if (!res.ok) throw new Error();
        stats = await res.json();
        if (!stats || stats.length === 0) {
          document.getElementById('loader').innerHTML = '<div style="color:var(--muted)">No stats available yet.</div>';
          return;
        }
        init();
      } catch {
        document.getElementById('loader').innerHTML = '<div style="color:#e05560">Failed to load stats.</div>';
      }
    }

    function init() {
      // Show chrome
      document.getElementById('sidebar').style.display = '';
      document.getElementById('bottombar').style.display = '';
      document.getElementById('progress').style.display = '';

      // Build sidebar
      const sidebarList = document.getElementById('sidebar-list');
      stats.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'sidebar-item' + (i === 0 ? ' active' : '');
        el.textContent = s.title;
        el.onclick = () => goTo(i);
        el.id = `sidebar-${i}`;
        sidebarList.appendChild(el);
      });

      // Build dots
      const dotTrack = document.getElementById('dot-track');
      stats.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goTo(i);
        dot.id = `dot-${i}`;
        dotTrack.appendChild(dot);
      });

      document.getElementById('progress-total').textContent = stats.length;
      displayStat(0);
    }

    function goTo(index) {
      currentIndex = index;
      displayStat(index);
    }

    function navigate(dir) {
      const next = (currentIndex + dir + stats.length) % stats.length;
      goTo(next);
    }

    function displayStat(index) {
      const s = stats[index];
      const isRevealed = revealed[index] || false;

      // Update sidebar + dots
      document.querySelectorAll('.sidebar-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.dot').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      document.getElementById('progress-cur').textContent = index + 1;
      document.getElementById('btn-prev').style.visibility = stats.length > 1 ? 'visible' : 'hidden';

      const main = document.getElementById('main');
      main.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'stat-card';

      const tableRows = s.table.slice(1).map((row, ri) =>
        `<tr style="animation-delay:${ri * 40}ms">${row.map((cell, ci) => `<td>${cell}</td>`).join('')}</tr>`
      ).join('');

      const tableHtml = `
        <div class="table-wrap${isRevealed ? '' : ' hidden'}" id="table-wrap">
          <table>
            <thead><tr>${s.table[0].map(h => {
        const tip = TOOLTIPS[h];
        return `<th>${h}${tip ? `<span class="tip" data-tip="${tip}">?</span>` : ''}</th>`;
      }).join('')}</tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      `;

      card.innerHTML = `
        <div class="stat-eyebrow">The Results</div>
        <div class="stat-title">${s.title}</div>
        <div class="stat-desc">${s.description}</div>
        <button class="reveal-btn${isRevealed ? ' hidden' : ''}" id="reveal-btn" onclick="reveal(${index})">
          Reveal ✦
        </button>
        ${tableHtml}
      `;

      main.appendChild(card);
    }

    function reveal(index) {
      revealed[index] = true;
      document.getElementById('reveal-btn').classList.add('hidden');
      document.getElementById('table-wrap').classList.remove('hidden');
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); navigate(1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
      if (e.key === 'Enter' || e.key === 'r') {
        if (!revealed[currentIndex]) reveal(currentIndex);
      }
    });

    document.addEventListener('DOMContentLoaded', fetchStats);
  </script>
</body>
</html>
